name: Docker build

# CI du Carnet — push main → test → build images Docker → push GHCR.
# Le déclenchement du deploy côté VPS se fait via le webhook GitHub
# natif configuré dans Settings → Webhooks (event « package » ou
# « workflow_run »), pas dans ce workflow. Référence : 2mains/.github/
# workflows/docker-build.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Force toutes les actions JavaScript déclarant `node20` à tourner sur
# le runtime Node 24 du runner. Workaround officiel GitHub pour la
# transition node20 → node24 (déprécié juin 2026, retiré sept. 2026).
# Cf https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ─── Test : type-check + build smoke-test ──────────────────────
  # Tourne sur push ET PR. Les jobs build / deploy sont gated sur
  # push main only via leur `if`.
  test:
    name: Type check + Astro build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Pas de `version:` ici — la version pnpm est portée par le champ
      # `packageManager` dans package.json (pnpm@10.33.0). Spécifier les
      # deux fait planter l'action avec ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Build (Astro Node SSR)
        run: pnpm build

      # SSR mode : on vérifie que le bundle Node a bien été produit.
      - name: Smoke test — SSR bundle exists
        run: |
          test -f dist/server/entry.mjs
          test -d dist/client
          echo "SSR bundle present."

  # ─── Build & push image site (Astro) ───────────────────────────
  build-web:
    name: Build & push web image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Récupère les secrets build-time depuis Infisical (ADDRESS surtout —
      # nécessaire au build Astro pour `Astro.site` qui alimente sitemap,
      # RSS, canonical URLs, JSON-LD). Auth Universal Auth via Machine
      # Identity dédiée CI.
      #
      # ⚠ Cet Infisical est l'instance *cloud* utilisée par la CI (pas
      # l'Infisical self-hosted qui alimente le runtime VPS via deploy.sh).
      # Le path /services/carnet diffère donc de l'arbo /web qu'on retrouve
      # côté self-hosted.
      - name: Fetch build-time secrets from Infisical
        uses: Infisical/secrets-action@v1.0.7
        with:
          method: universal
          domain: ${{ secrets.INFISICAL_API_URL }}
          client-id: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          # L'action exige `project-slug` (pas l'UUID). Le GH secret est
          # nommé INFISICAL_PROJECT_ID pour des raisons historiques mais
          # doit contenir le SLUG du projet (visible dans l'URL admin
          # Infisical, ex. « carnet-ayz-p »).
          project-slug: ${{ secrets.INFISICAL_PROJECT_ID }}
          env-slug: prod
          secret-path: /services/carnet
          export-type: env

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.site
          # ADDRESS baké dans Astro.site au build (cf. astro.config.mjs).
          # Reçu en ARG par le stage `builder` du Dockerfile.
          build-args: |
            ADDRESS=${{ env.ADDRESS }}
          push: true
          tags: |
            ghcr.io/aliceout/carnet/web:latest
            ghcr.io/aliceout/carnet/web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  # ─── Build & push image Payload (CMS) ──────────────────────────
  build-payload:
    name: Build & push payload image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push payload
        uses: docker/build-push-action@v6
        with:
          context: services/payload
          file: services/payload/Dockerfile
          push: true
          tags: |
            ghcr.io/aliceout/carnet/payload:latest
            ghcr.io/aliceout/carnet/payload:${{ github.sha }}
          cache-from: type=gha,scope=payload
          cache-to: type=gha,scope=payload,mode=max
