<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Carnet — admin (prototype Payload)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=source-serif-4:400,400i,500,600,700|inter:400,500,600,700|jetbrains-mono:400,500" rel="stylesheet" />
  <style>
    :root{
      --b-ink:#1a1d28; --b-bg:#fdfcf8; --b-paper:#ffffff;
      --b-rule:#d6d3c8; --b-muted:#5e6373; --b-accent:#5a3a7a;
      --b-accent-tint:rgba(90,58,122,.06);
    }
    *{box-sizing:border-box}
    html,body{margin:0;background:var(--b-bg);color:var(--b-ink);
      font-family:"Inter",system-ui,sans-serif;font-size:13px;line-height:1.5;
      -webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer}
    input,textarea,select{font:inherit;color:inherit}
    .serif{font-family:"Source Serif 4",Georgia,serif}
    .mono{font-family:"JetBrains Mono",ui-monospace,monospace}
    .accent{color:var(--b-accent)}
    .muted{color:var(--b-muted)}

    /* ---------- App chrome ---------- */
    .app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
    .app.no-chrome{grid-template-columns:1fr}

    /* Sidebar */
    aside.side{background:var(--b-bg);border-right:1px solid var(--b-rule);
      display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
    aside.side .brand{font-family:"Source Serif 4",serif;font-size:22px;font-weight:600;
      padding:20px 24px 16px;letter-spacing:-.3px}
    aside.side .brand .dot{color:var(--b-accent)}
    aside.side nav{flex:1;overflow:auto;padding:8px 0}
    aside.side .grp{padding:14px 24px 4px;font-size:10.5px;font-weight:600;
      letter-spacing:.12em;text-transform:uppercase;color:var(--b-muted)}
    aside.side a.item{display:flex;justify-content:space-between;align-items:center;
      padding:7px 24px;color:var(--b-ink);border-left:2px solid transparent;
      margin-left:0;font-size:13px}
    aside.side a.item:hover{background:var(--b-accent-tint)}
    aside.side a.item.active{border-left-color:var(--b-accent);background:var(--b-accent-tint);
      font-weight:600}
    aside.side a.item .n{color:var(--b-muted);font-family:"JetBrains Mono",monospace;font-size:11px}
    aside.side .foot{border-top:1px solid var(--b-rule);padding:14px 24px;font-size:12px;
      display:flex;align-items:center;gap:10px}
    aside.side .foot .av{width:26px;height:26px;background:var(--b-accent);color:#fff;
      display:flex;align-items:center;justify-content:center;font-family:"Source Serif 4",serif;
      font-weight:600;font-size:13px}
    aside.side .foot .who{flex:1;line-height:1.3}
    aside.side .foot .who .n{font-weight:600}
    aside.side .foot .who .e{color:var(--b-muted);font-size:11px}

    /* Top header (per-screen, inside main) */
    main{min-width:0;display:flex;flex-direction:column}
    header.top{background:var(--b-bg);border-bottom:1px solid var(--b-rule);
      padding:0 32px;height:56px;display:flex;align-items:center;gap:24px}
    header.top .crumbs{font-size:12px;color:var(--b-muted)}
    header.top .crumbs a:hover{color:var(--b-ink)}
    header.top .crumbs .sep{padding:0 8px;color:var(--b-rule)}
    header.top .crumbs .cur{color:var(--b-ink)}
    header.top .spacer{flex:1}
    header.top .acts{display:flex;gap:8px;align-items:center}

    /* Buttons */
    .btn{padding:7px 14px;border:1px solid var(--b-rule);background:var(--b-paper);
      font-size:12.5px;color:var(--b-ink);cursor:pointer;line-height:1}
    .btn:hover{border-color:var(--b-ink)}
    .btn.primary{background:var(--b-ink);color:var(--b-bg);border-color:var(--b-ink)}
    .btn.primary:hover{background:#000}
    .btn.accent{background:var(--b-accent);color:#fff;border-color:var(--b-accent)}
    .btn.accent:hover{background:#4a2e66}
    .btn.ghost{background:transparent}
    .btn .kbd{margin-left:8px;font-family:"JetBrains Mono",monospace;font-size:10.5px;
      color:var(--b-muted);font-weight:400}

    /* Statut chip */
    .chip{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;
      font-size:11px;font-weight:500;border:1px solid var(--b-rule);background:var(--b-paper)}
    .chip .dot{width:6px;height:6px;background:var(--b-muted);border-radius:50%}
    .chip.draft .dot{background:#b8842a}
    .chip.published{border-color:var(--b-accent);color:var(--b-accent)}
    .chip.published .dot{background:var(--b-accent)}
    .chip.scheduled .dot{background:#3a6a8a}

    /* Content area */
    .scroll{flex:1;overflow:auto}
    .pad{padding:32px}
    .pad-narrow{padding:32px;max-width:1180px}
    .pad-wide{padding:32px;max-width:none}

    /* ---------- Login ---------- */
    .login{min-height:100vh;display:grid;grid-template-rows:1fr auto;background:var(--b-bg)}
    .login .center{display:flex;align-items:center;justify-content:center}
    .login .card{width:380px;padding:0 24px}
    .login .brand{font-family:"Source Serif 4",serif;font-size:64px;font-weight:600;
      letter-spacing:-1px;margin:0 0 6px}
    .login .brand .dot{color:var(--b-accent)}
    .login .sub{color:var(--b-muted);margin-bottom:36px;font-size:13px}
    .login label{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;
      text-transform:uppercase;color:var(--b-muted);margin-bottom:6px}
    .login .field{margin-bottom:18px}
    .login input{width:100%;padding:10px 12px;background:var(--b-paper);
      border:1px solid var(--b-rule);font-size:14px}
    .login input:focus{outline:none;border-color:var(--b-accent)}
    .login .btn{width:100%;padding:11px 16px;margin-top:8px;font-size:13px}
    .login .meta{display:flex;justify-content:space-between;font-size:12px;
      color:var(--b-muted);margin-top:14px}
    .login .meta a:hover{color:var(--b-accent)}
    .login .foot{padding:24px 32px;border-top:1px solid var(--b-rule);
      display:flex;justify-content:space-between;font-family:"JetBrains Mono",monospace;
      font-size:11px;color:var(--b-muted)}

    /* ---------- Dashboard ---------- */
    .dash .kicker{font-size:11px;letter-spacing:.14em;text-transform:uppercase;
      color:var(--b-accent);margin-bottom:10px}
    .dash h1{font-family:"Source Serif 4",serif;font-size:48px;line-height:1.05;
      font-weight:600;letter-spacing:-.6px;margin:0 0 8px}
    .dash h1 em{font-weight:500}
    .dash .lede{font-size:15px;color:var(--b-muted);margin:0 0 36px;max-width:600px;line-height:1.55}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-bottom:48px;
      border-top:1px solid var(--b-rule);border-bottom:1px solid var(--b-rule)}
    .stats .s{padding:20px 24px;border-right:1px solid var(--b-rule)}
    .stats .s:last-child{border-right:0}
    .stats .s .n{font-family:"Source Serif 4",serif;font-size:34px;font-weight:600;
      line-height:1;margin-bottom:6px;letter-spacing:-.5px}
    .stats .s .l{font-size:12px;color:var(--b-muted)}
    .dash .twocol{display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-bottom:48px}
    .blk h3{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
      color:var(--b-ink);margin:0 0 14px;display:flex;justify-content:space-between;align-items:baseline}
    .blk h3 a{font-size:11px;color:var(--b-muted);text-transform:none;letter-spacing:0;font-weight:400}
    .blk h3 a:hover{color:var(--b-accent)}
    .draft-row{display:grid;grid-template-columns:60px 1fr 90px;gap:16px;
      padding:14px 0;border-top:1px solid var(--b-rule);align-items:baseline;cursor:pointer}
    .draft-row:hover .t{color:var(--b-accent)}
    .draft-row .num{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--b-muted)}
    .draft-row .t{font-size:14px;line-height:1.4;font-weight:500}
    .draft-row .meta{font-size:11px;color:var(--b-muted)}
    .draft-row .meta .ty{color:var(--b-accent)}
    .draft-row .upd{font-size:11px;color:var(--b-muted);text-align:right}
    .shortcuts{display:grid;grid-template-columns:repeat(3,1fr);gap:0;
      border:1px solid var(--b-rule)}
    .shortcuts a{padding:18px 20px;border-right:1px solid var(--b-rule);
      display:flex;flex-direction:column;gap:6px;cursor:pointer}
    .shortcuts a:last-child{border-right:0}
    .shortcuts a:hover{background:var(--b-accent-tint)}
    .shortcuts .l{font-size:11px;color:var(--b-muted);font-family:"JetBrains Mono",monospace}
    .shortcuts .t{font-family:"Source Serif 4",serif;font-size:18px;font-weight:600;
      letter-spacing:-.2px}

    /* ---------- Collection list ---------- */
    .clist .toolbar{display:flex;gap:8px;align-items:center;padding:0 0 20px;flex-wrap:wrap}
    .clist .search{flex:1;min-width:240px;max-width:380px;position:relative}
    .clist .search input{width:100%;padding:8px 12px 8px 32px;background:var(--b-paper);
      border:1px solid var(--b-rule);font-size:13px}
    .clist .search input:focus{outline:none;border-color:var(--b-accent)}
    .clist .search .ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);
      font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--b-muted)}
    .clist .filter{padding:8px 12px;background:var(--b-paper);border:1px solid var(--b-rule);
      font-size:13px;color:var(--b-ink);cursor:pointer;display:flex;gap:6px;align-items:center}
    .clist .filter:hover{border-color:var(--b-ink)}
    .clist .filter .v{color:var(--b-accent);font-weight:500}
    .clist .filter .x{color:var(--b-muted);margin-left:2px;font-family:"JetBrains Mono",monospace}
    .clist .table{border:1px solid var(--b-rule);background:var(--b-paper)}
    .clist .row{display:grid;grid-template-columns:60px 110px 130px 180px 1fr 100px 32px;
      gap:16px;padding:12px 16px;align-items:baseline;border-bottom:1px solid var(--b-rule);cursor:pointer}
    .clist .row:last-child{border-bottom:0}
    .clist .row:hover{background:var(--b-accent-tint)}
    .clist .row.head{background:var(--b-bg);border-bottom:1px solid var(--b-rule);
      font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
      color:var(--b-muted);cursor:default}
    .clist .row.head:hover{background:var(--b-bg)}
    .clist .row .num{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--b-muted)}
    .clist .row .date{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--b-ink)}
    .clist .row .ty{font-size:12px;color:var(--b-accent)}
    .clist .row .pole{font-size:12px;color:var(--b-muted)}
    .clist .row .t{font-size:14px;font-weight:500;line-height:1.4}
    .clist .row .more{color:var(--b-muted);font-family:"JetBrains Mono",monospace;text-align:right}
    .clist .pag{display:flex;justify-content:space-between;align-items:center;
      padding:18px 0;font-size:12px;color:var(--b-muted)}
    .clist .pag .nav{display:flex;gap:6px}
    .clist .pag .pg{padding:5px 10px;border:1px solid var(--b-rule);min-width:30px;
      text-align:center;background:var(--b-paper)}
    .clist .pag .pg.on{border-color:var(--b-accent);color:var(--b-accent);font-weight:600}

    /* ---------- Document view ---------- */
    .doc{display:grid;grid-template-columns:1fr 300px;min-height:0}
    .doc .center{padding:28px 32px;overflow:auto;min-width:0}
    .doc .meta{border-left:1px solid var(--b-rule);background:var(--b-bg);
      padding:24px 22px 32px;overflow:auto}
    .doc .ed-card{background:var(--b-paper);border:1px solid var(--b-rule);
      border-radius:4px;width:100%;max-width:none;margin:0;padding:32px 40px 28px;
      position:relative}
    .doc .ed-num{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--b-muted);
      margin-bottom:14px;letter-spacing:.04em}
    .doc .ed-num .id{color:var(--b-ink)}
    .doc .ed-title{font-family:"Source Serif 4",serif;font-size:36px;line-height:1.1;
      font-weight:600;letter-spacing:-.4px;margin:0 0 14px;outline:none;
      border:0;background:transparent;width:100%;display:block;padding:0;
      color:var(--b-ink)}
    .doc .ed-title:focus{outline:none}
    .doc .ed-lede{font-family:"Source Serif 4",serif;font-size:18px;line-height:1.5;
      color:var(--b-muted);margin:0 0 28px;outline:none;border:0;background:transparent;
      width:100%;resize:none;padding:0;font-weight:400}
    .doc .ed-divider{border-top:1px solid var(--b-rule);margin:0 0 24px}
    .doc .ed-body{font-family:"Source Serif 4",serif;font-size:17px;line-height:1.65;
      color:var(--b-ink);min-height:280px;outline:none}
    .doc .ed-body p{margin:0 0 1em}
    .doc .ed-body h2{font-size:24px;font-weight:600;margin:24px 0 12px;letter-spacing:-.2px}
    .doc .ed-body .ed-cursor{display:inline-block;width:1.5px;height:18px;
      background:var(--b-accent);vertical-align:-3px;animation:blink 1s steps(2) infinite;margin-left:1px}
    @keyframes blink{50%{opacity:0}}
    .doc .ed-body .block-tag{display:inline-block;padding:0 6px;background:var(--b-accent-tint);
      color:var(--b-accent);font-family:"Inter",sans-serif;font-size:11px;font-weight:500;
      border:1px solid var(--b-accent);vertical-align:1px;margin:0 2px}

    /* Slash menu */
    .slash{position:absolute;background:var(--b-paper);border:1px solid var(--b-rule);
      box-shadow:0 4px 16px rgba(26,29,40,.12);width:280px;font-family:"Inter",sans-serif;
      z-index:5}
    .slash .lbl{padding:8px 14px;font-size:10.5px;font-weight:600;letter-spacing:.1em;
      text-transform:uppercase;color:var(--b-muted);border-bottom:1px solid var(--b-rule)}
    .slash .opt{padding:10px 14px;display:grid;grid-template-columns:24px 1fr auto;gap:12px;
      align-items:baseline;border-bottom:1px solid var(--b-rule)}
    .slash .opt:last-child{border-bottom:0}
    .slash .opt:hover,.slash .opt.on{background:var(--b-accent-tint)}
    .slash .opt .ic{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--b-accent);
      text-align:center}
    .slash .opt .lab{font-size:13px;font-weight:500}
    .slash .opt .desc{display:block;font-size:11px;color:var(--b-muted);font-weight:400;margin-top:2px}
    .slash .opt .kbd{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--b-muted)}

    /* Citation block in editor */
    .doc .ed-body blockquote.cit{margin:18px 0;padding:14px 18px;border-left:3px solid var(--b-accent);
      background:var(--b-bg);font-size:18px;line-height:1.5;font-weight:500}
    .doc .ed-body .fn-anchor{color:var(--b-accent);text-decoration:none;font-weight:500}

    /* Footnotes editor */
    .doc .fn-block{width:100%;max-width:none;margin:24px 0 0;border:1px solid var(--b-rule);
      background:var(--b-paper);border-radius:4px}
    .doc .fn-block .h{padding:12px 20px;font-size:11px;font-weight:600;letter-spacing:.1em;
      text-transform:uppercase;color:var(--b-ink);border-bottom:1px solid var(--b-rule);
      display:flex;justify-content:space-between;align-items:center}
    .doc .fn-block .h .add{font-family:"JetBrains Mono",monospace;font-size:11px;
      color:var(--b-accent);font-weight:500;letter-spacing:0;text-transform:none;cursor:pointer}
    .doc .fn-row{display:grid;grid-template-columns:36px 1fr 28px;gap:14px;
      padding:12px 20px;border-bottom:1px solid var(--b-rule);align-items:baseline}
    .doc .fn-row:last-child{border-bottom:0}
    .doc .fn-row .n{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--b-accent);
      padding-top:5px}
    .doc .fn-row .body{font-family:"Source Serif 4",serif;font-size:14px;line-height:1.55;
      color:var(--b-ink)}
    .doc .fn-row .body em{font-style:italic}
    .doc .fn-row .x{color:var(--b-muted);font-family:"JetBrains Mono",monospace;
      cursor:pointer;text-align:right;font-size:13px}

    /* Sidebar meta */
    .meta-pane h3{font-size:10.5px;font-weight:600;letter-spacing:.12em;
      text-transform:uppercase;color:var(--b-muted);margin:0 0 14px}
    .meta-pane .field{margin-bottom:18px}
    .meta-pane .field label{display:block;font-size:11px;font-weight:600;
      color:var(--b-ink);margin-bottom:5px}
    .meta-pane .field input,.meta-pane .field select,.meta-pane .field textarea{
      width:100%;padding:7px 10px;background:var(--b-paper);border:1px solid var(--b-rule);
      font-size:12.5px;color:var(--b-ink)}
    .meta-pane .field input:focus,.meta-pane .field select:focus{
      outline:none;border-color:var(--b-accent)}
    .meta-pane .field .auto{font-family:"JetBrains Mono",monospace;font-size:12px;
      color:var(--b-muted);padding:7px 10px;border:1px dashed var(--b-rule);background:var(--b-bg)}
    .meta-pane .field .help{font-size:11px;color:var(--b-muted);margin-top:4px}
    .meta-pane .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .meta-pane hr{border:0;border-top:1px solid var(--b-rule);margin:22px 0}
    .meta-pane .relbox{padding:7px 10px;background:var(--b-paper);border:1px solid var(--b-rule);
      display:flex;justify-content:space-between;align-items:center;font-size:12.5px}
    .meta-pane .relbox .x{color:var(--b-muted);font-family:"JetBrains Mono",monospace;cursor:pointer}
    .meta-pane .biblio-list{border:1px solid var(--b-rule);background:var(--b-paper)}
    .meta-pane .biblio-list .b-row{padding:8px 10px;border-bottom:1px solid var(--b-rule);
      font-size:12px;line-height:1.45}
    .meta-pane .biblio-list .b-row:last-child{border-bottom:0}
    .meta-pane .biblio-list .b-row .au{font-weight:600}
    .meta-pane .biblio-list .b-row .ti{color:var(--b-muted);font-style:italic}
    .meta-pane .add-rel{padding:7px 10px;background:transparent;border:1px dashed var(--b-rule);
      color:var(--b-muted);width:100%;text-align:left;font-size:12px;cursor:pointer;margin-top:6px}
    .meta-pane .add-rel:hover{border-color:var(--b-accent);color:var(--b-accent)}

    /* Toast */
    .toast{position:fixed;bottom:24px;right:24px;background:var(--b-ink);color:var(--b-bg);
      padding:12px 18px;font-size:12.5px;display:flex;align-items:center;gap:10px;
      box-shadow:0 4px 16px rgba(26,29,40,.18);z-index:50}
    .toast .ic{color:#7ad19a;font-family:"JetBrains Mono",monospace}

    /* ---------- Biblio edit ---------- */
    .bib .form{width:100%;margin:0;background:var(--b-paper);
      border:1px solid var(--b-rule);border-radius:4px;padding:32px 40px}
    .bib h1{font-family:"Source Serif 4",serif;font-size:30px;font-weight:600;
      letter-spacing:-.3px;margin:0 0 4px}
    .bib .id{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--b-muted);margin-bottom:24px}
    .bib .grp{margin-bottom:24px}
    .bib .grp h3{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
      color:var(--b-muted);margin:0 0 12px;padding-bottom:6px;border-bottom:1px solid var(--b-rule)}
    .bib .field{margin-bottom:14px}
    .bib .field label{display:block;font-size:11px;font-weight:600;color:var(--b-ink);margin-bottom:4px}
    .bib .field input,.bib .field select,.bib .field textarea{
      width:100%;padding:8px 11px;background:var(--b-bg);border:1px solid var(--b-rule);font-size:13px}
    .bib .field input:focus,.bib .field select:focus,.bib .field textarea:focus{
      outline:none;border-color:var(--b-accent);background:var(--b-paper)}
    .bib .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .bib .grid3{display:grid;grid-template-columns:140px 1fr 1fr;gap:14px}
    .bib .preview{margin-top:12px;padding:14px 18px;background:var(--b-bg);
      border-left:2px solid var(--b-accent);font-family:"Source Serif 4",serif;
      font-size:14px;line-height:1.55}
    .bib .preview .lbl{font-family:"Inter",sans-serif;font-size:10.5px;color:var(--b-muted);
      letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;font-weight:600}
    .bib .used-in{margin-top:14px;font-size:12px;color:var(--b-muted)}
    .bib .used-in a{color:var(--b-accent)}

    /* ---------- Screen nav (prototype-only) ---------- */
    .scr-nav{position:fixed;bottom:8px;right:8px;background:var(--b-paper);
      border:1px solid var(--b-rule);font-family:"Inter",sans-serif;font-size:11px;
      display:flex;z-index:100;box-shadow:0 4px 12px rgba(26,29,40,.08)}
    .scr-nav a{padding:6px 10px;border-right:1px solid var(--b-rule);color:var(--b-muted)}
    .scr-nav a:last-child{border-right:0}

`<p>Lorsque le Conseil des droits de l'homme des Nations unies adopte, en juin 2011, sa r\u00e9solution\u00a017/19 sur l'orientation sexuelle et l'identit\u00e9 de genre, le geste para\u00eet modeste\u00a0: un texte court, vot\u00e9 \u00e0 une majorit\u00e9 \u00e9troite, demandant un rapport au Haut-Commissariat. Ce vote constitue pourtant <em>le</em> pr\u00e9c\u00e9dent\u00a0; tout ce que je veux examiner ici en d\u00e9coule ou s'y oppose<a class="fn-anchor" href="#fn1">[1]</a>.</p>
<p>Quinze ans plus tard, le paysage diplomatique a bascul\u00e9. La d\u00e9fense des droits LGBTQI+ est devenue, tour \u00e0 tour, un marqueur d'identit\u00e9 occidentale, une <em>monnaie</em> dans les rapports Nord-Sud, un enjeu de polarisation interne dans les d\u00e9mocraties lib\u00e9rales, et un vecteur d'instrumentalisation tant par certains \u00c9tats \u00ab\u00a0progressistes\u00a0\u00bb que par leurs adversaires d\u00e9clar\u00e9s<a class="fn-anchor" href="#fn2">[2]</a>.</p>
<h2>I \u2014 La r\u00e9solution comme acte fondateur</h2>
<p>Il faut revenir \u00e0 la s\u00e9quence elle-m\u00eame. Le projet sud-africain, soutenu par le Br\u00e9sil, prend forme dans un contexte o\u00f9 l'Afrique du Sud post-apartheid se r\u00eave m\u00e9diatrice morale du Sud global<span class="block-tag">@biblio: saiz-2014</span>.</p>
<blockquote class="cit">Le pinkwashing n'est pas le mensonge d'un \u00c9tat qui maquillerait sa violence\u00a0; c'est le travail quotidien de red\u00e9finition de ce que vaut, internationalement, la qualit\u00e9 d'\u00c9tat de droit.</blockquote>
<p>On peut objecter que cette g\u00e9n\u00e9alogie a \u00e9t\u00e9 rapidement effac\u00e9e<span class="ed-cursor"></span></p>` }),

  // ---------- Mount ----------
  function render() {
    const route = parseHash();
    const root = document.getElementById('root');
    root.innerHTML = '';
    document.body.classList.remove('no-chrome');

    // Update screen-nav highlight
    const map = { login:'login', dashboard:'dashboard', posts: route.id ? 'post' : 'posts', biblio: route.id ? 'biblio' : 'biblio' };
    const target = map[route.name] || route.name;
    document.querySelectorAll('#scrNav a').forEach(a => a.classList.toggle('on', a.dataset.r === target));

    if (route.name === 'login') {
      root.appendChild(ScreenLogin());
      return;
    }

    const wrap = el('div', { class:'app' });
    let active;
    let main;
    if (route.name === 'posts' && route.id) { active = 'posts'; main = ScreenDoc(route.id); }
    else if (route.name === 'posts')         { active = 'posts'; main = ScreenList(); }
    else if (route.name === 'biblio' && route.id){ active = 'biblio'; main = ScreenBiblio(route.id); }
    else if (route.name === 'biblio')        { active = 'biblio'; main = ScreenBiblio('saiz-2014'); }
    else                                     { active = 'dashboard'; main = ScreenDashboardReal(); }
    wrap.appendChild(Sidebar(active));
    wrap.appendChild(main);
    root.appendChild(wrap);

    if (route.name === 'posts' && route.id) root.appendChild(Toast());
  }

  window.addEventListener('hashchange', render);
  if (!location.hash) location.hash = '#/dashboard';
  render();

  // ---------- Tweaks (host protocol) ----------
  const PAPER_OPTS = [
    { v:'#ffffff', n:'pur' },
    { v:'#fbfaf6', n:'crème' },
    { v:'#f7f5ee', n:'craie' },
    { v:'#f3f0e6', n:'parchemin' },
    { v:'#f1efe9', n:'ivoire' },
    { v:'#eeece4', n:'lin' },
  ];
  const ACCENT_OPTS = ['#1a1d28','#8a3a3a','#5a3a7a','#1f3a5a','#2d5a3d'];
  const TW_DEFAULTS = /*EDITMODE-BEGIN*/{
    "paper": "#fbfaf6",
    "accent": "#1a1d28"
  }/*EDITMODE-END*/;
  let tw = { ...TW_DEFAULTS };

  function applyTweaks() {
    document.documentElement.style.setProperty('--b-paper', tw.paper);
    document.documentElement.style.setProperty('--b-accent', tw.accent);
    // recompute tint from accent
    const m = tw.accent.match(/^#(..)(..)(..)$/);
    if (m) {
      const r = parseInt(m[1],16), g = parseInt(m[2],16), b = parseInt(m[3],16);
      document.documentElement.style.setProperty('--b-accent-tint', `rgba(${r},${g},${b},.06)`);
    }
  }

  function buildSwatches() {
    const sp = document.getElementById('swPaper');
    sp.innerHTML = '';
    PAPER_OPTS.forEach(o => {
      const s = document.createElement('div');
      s.className = 'sw' + (o.v === tw.paper ? ' on' : '');
      s.style.background = o.v;
      s.title = o.n + ' · ' + o.v;
      const lab = document.createElement('div'); lab.className='n'; lab.textContent = o.n;
      s.appendChild(lab);
      s.onclick = () => { tw.paper = o.v; applyTweaks(); buildSwatches(); persist(); };
      sp.appendChild(s);
    });
    const sa = document.getElementById('swAccent');
    sa.innerHTML = '';
    ACCENT_OPTS.forEach(v => {
      const s = document.createElement('div');
      s.className = 'sw' + (v === tw.accent ? ' on' : '');
      s.style.background = v;
      s.title = v;
      s.onclick = () => { tw.accent = v; applyTweaks(); buildSwatches(); persist(); };
      sa.appendChild(s);
    });
  }

  function persist() {
    try { window.parent.postMessage({ type:'__edit_mode_set_keys', edits: tw }, '*'); } catch(e) {}
  }

  // host protocol: register listener BEFORE announcing availability
  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.type === '__activate_edit_mode') document.getElementById('tw').classList.add('open');
    else if (d.type === '__deactivate_edit_mode') document.getElementById('tw').classList.remove('open');
  });
  document.getElementById('twX').onclick = () => {
    document.getElementById('tw').classList.remove('open');
    try { window.parent.postMessage({ type:'__edit_mode_dismissed' }, '*'); } catch(e) {}
  };
  applyTweaks();
  buildSwatches();
  try { window.parent.postMessage({ type:'__edit_mode_available' }, '*'); } catch(e) {}
  </script>
