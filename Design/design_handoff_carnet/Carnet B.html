<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Carnet — direction B (prototype)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=source-serif-4:400,400i,500,600,700|inter:400,500,600,700|jetbrains-mono:400,500" rel="stylesheet" />
  <style>
    :root{
      --b-ink:#1a1d28; --b-bg:#f6f5f1; --b-paper:#fbfaf6;
      --b-rule:#d6d3c8; --b-muted:#5e6373; --b-accent:#5a3a7a;
      --b-density:1; /* 1 aéré, .75 serré */
    }
    *{box-sizing:border-box}
    html,body{margin:0;background:var(--b-bg);color:var(--b-ink);font-family:"Source Serif 4",Georgia,serif}
    a{color:inherit;text-decoration:none}
    .sans{font-family:"Inter",system-ui,sans-serif}
    .mono{font-family:"JetBrains Mono",ui-monospace,monospace}
    .accent{color:var(--b-accent)}
    .rule{border:0;border-top:1px solid var(--b-rule)}
    .container{max-width:1280px;margin:0 auto;padding:0 80px}
    .narrow{max-width:980px;margin:0 auto;padding:0 80px}

    /* Header */
    header.site{background:var(--b-bg);border-bottom:1px solid var(--b-rule)}
    header.site .row{display:flex;align-items:baseline;justify-content:space-between;padding:24px 80px 18px;max-width:1280px;margin:0 auto}
    header.site .brand{font-size:22px;font-weight:600;letter-spacing:-.3px}
    header.site .brand .dot{color:var(--b-accent)}
    header.site nav{display:flex;gap:28px;font-family:"Inter",sans-serif;font-size:13px}
    header.site nav a{color:var(--b-muted);padding-bottom:4px}
    header.site nav a.active{color:var(--b-ink);font-weight:600;border-bottom:1.5px solid var(--b-accent)}

    /* Footer */
    footer.site{background:var(--b-bg);border-top:1px solid var(--b-rule);margin-top:80px;padding:64px 0 56px}
    footer.site .grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:56px;font-family:"Inter",sans-serif;font-size:13px;color:var(--b-ink)}
    footer.site h4{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--b-muted);margin:0 0 12px;font-weight:600}
    footer.site .links{display:grid;gap:6px}

    /* Progress bar */
    .progress{position:sticky;top:0;height:2px;background:transparent;z-index:5}
    .progress > div{height:100%;background:var(--b-accent);transition:width .12s}

    /* Hero */
    .hero{padding:72px 0 48px;border-bottom:1px solid var(--b-rule)}
    .hero .meta{font-family:"Inter",sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--b-accent);margin-bottom:18px}
    .hero h1{font-size:64px;line-height:1.04;font-weight:600;letter-spacing:-.7px;margin:0 0 20px;max-width:1080px}
    .hero h1 em{font-weight:500}
    .hero p.lede{font-size:20px;line-height:1.55;color:var(--b-muted);max-width:720px;margin:0}
    .hero .stats{margin-top:32px;display:flex;gap:48px;font-family:"Inter",sans-serif;font-size:12px;color:var(--b-muted)}
    .hero .stats .n{display:block;font-family:"Source Serif 4",serif;font-size:24px;color:var(--b-ink);font-weight:600}

    /* Filters */
    .filters{padding:18px 0;border-bottom:1px solid var(--b-rule);font-family:"Inter",sans-serif;font-size:13px}
    .filters .row{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
    .filters .grp{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .filters .lbl{color:var(--b-muted);padding-right:8px}
    .chip{padding:6px 12px;border-radius:999px;border:1px solid var(--b-rule);background:transparent;color:var(--b-muted);cursor:pointer;font:inherit}
    .chip.on{background:var(--b-ink);color:var(--b-bg);border-color:var(--b-ink)}
    .chip:hover:not(.on){border-color:var(--b-ink);color:var(--b-ink)}
    .filters .count{margin-left:auto;color:var(--b-muted)}
    .filters .sep{width:1px;height:20px;background:var(--b-rule)}

    /* Flux item */
    .item{display:grid;grid-template-columns:120px 1fr 200px;gap:48px;padding:calc(40px * var(--b-density)) 0;border-bottom:1px solid var(--b-rule);align-items:baseline;cursor:pointer}
    .item:hover h2{color:var(--b-accent)}
    .item .lcol{font-family:"Inter",sans-serif;font-size:12px;color:var(--b-muted)}
    .item .num{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--b-ink)}
    .item .date{margin-top:8px;font-size:13px;color:var(--b-ink);font-weight:500}
    .item .read{margin-top:12px;font-size:11px}
    .item .kicker{font-family:"Inter",sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--b-accent);margin-bottom:10px}
    .item .kicker .pole{color:var(--b-muted)}
    .item h2{font-size:26px;line-height:1.2;font-weight:600;margin:0 0 12px;letter-spacing:-.3px;transition:color .12s}
    .item p{font-size:16px;line-height:1.55;color:#3b3f4d;margin:0;max-width:580px}
    .item .rcol{font-family:"Inter",sans-serif;font-size:12px;color:var(--b-muted);text-align:right}
    .item .rcol .lk{color:var(--b-accent);font-weight:500}
    .item .rcol .tags{margin-top:8px;display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap}
    .item .rcol .tag{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--b-muted)}

    /* Article */
    article.post{padding:48px 0 0}
    article.post .crumbs{font-family:"Inter",sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--b-muted);margin-bottom:18px}
    article.post .crumbs a{color:var(--b-muted)}
    article.post .crumbs a:hover{color:var(--b-ink)}
    article.post .kicker{font-family:"Inter",sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--b-accent);margin-bottom:14px}
    article.post h1{font-size:52px;line-height:1.08;font-weight:600;letter-spacing:-.7px;margin:0 0 20px}
    article.post h1 em{font-weight:500}
    article.post .deck{font-size:22px;line-height:1.5;color:var(--b-muted);margin:0 0 32px;max-width:720px}
    article.post .meta-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;padding:20px 0;border-top:1px solid var(--b-rule);border-bottom:1px solid var(--b-rule);font-family:"Inter",sans-serif;font-size:12px;color:var(--b-muted);margin-bottom:48px}
    article.post .meta-strip .lbl{color:var(--b-ink);font-weight:600;font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}

    /* Body — sidenotes-aware grid */
    .body-grid{display:grid;grid-template-columns:minmax(0,640px) 220px;gap:60px;align-items:start;margin:0 auto;max-width:920px}
    .body-grid .col{font-size:19px;line-height:1.7;color:#22242e}
    .body-grid .col p{margin:0 0 1.2em}
    .body-grid .col h2{font-size:30px;font-weight:600;letter-spacing:-.3px;margin:48px 0 16px;font-family:"Source Serif 4",serif}
    .body-grid .col h3{font-size:22px;font-weight:600;margin:32px 0 12px}
    .body-grid .col blockquote{font-size:22px;line-height:1.5;font-weight:500;color:var(--b-ink);margin:36px 0;padding:0 0 0 22px;border-left:2px solid var(--b-accent)}
    .body-grid .col a.ext{border-bottom:1px solid var(--b-accent);color:inherit}
    .body-grid .col a.int{border-bottom:1px dotted var(--b-muted);color:inherit}
    .body-grid .col sup a{color:var(--b-accent)}
    .body-grid .col .lettrine{float:left;font-family:"Source Serif 4",serif;font-weight:600;font-size:90px;line-height:.82;margin:8px 10px 0 0;color:var(--b-ink)}
    .body-grid .marg{font-family:"Inter",sans-serif;font-size:12.5px;line-height:1.55;color:var(--b-muted)}
    .body-grid .marg .sn{padding:10px 0;border-top:1px solid var(--b-rule)}
    .body-grid .marg .sn .n{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--b-accent);margin-right:6px}

    /* Mode notes classiques */
    body.notes-classic .body-grid{grid-template-columns:minmax(0,660px);max-width:720px;justify-content:center}
    body.notes-classic .body-grid .marg{display:none}
    body.notes-classic .footnotes-classic{display:block}
    .footnotes-classic{display:none;border-top:1px solid var(--b-rule);margin-top:48px;padding-top:24px;max-width:720px;margin-left:auto;margin-right:auto}
    .footnotes-classic h3{font-family:"Inter",sans-serif;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--b-ink);margin:0 0 14px}
    .footnotes-classic ol{font-size:14px;line-height:1.6;color:#3b3f4d;padding-left:22px;margin:0}
    .footnotes-classic li{margin-bottom:8px}

    body.no-lettrine .body-grid .col .lettrine{float:none;font-size:inherit;font-weight:inherit;margin:0;display:inline}
    body.justify .body-grid .col p,
    body.justify .body-grid .col li,
    body.justify article.post .deck{text-align:justify;hyphens:auto;-webkit-hyphens:auto}

    /* Tail (biblio, citation, related) */
    .tail{max-width:720px;margin:48px auto 0}
    .tail h3{font-family:"Inter",sans-serif;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--b-ink);margin:0 0 14px}
    .tail ul.biblio{font-size:14px;line-height:1.65;color:#3b3f4d;padding-left:22px;margin:0}
    .tail ul.biblio li{margin-bottom:6px}
    .citation{background:#ece9e0;padding:24px 28px;margin-top:40px;border-radius:4px}
    .citation .lbl{font-family:"Inter",sans-serif;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--b-accent);margin-bottom:10px}
    .citation .body{font-size:15px;line-height:1.55;color:var(--b-ink)}
    .citation .body .url{font-family:"JetBrains Mono",monospace;font-size:12px}
    .citation .acts{font-family:"Inter",sans-serif;font-size:12px;color:var(--b-accent);margin-top:12px;display:flex;gap:16px}
    .citation .acts a{cursor:pointer}
    .related{margin-top:56px;padding-top:32px;border-top:1px solid var(--b-rule)}
    .related .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .related a{padding:14px 0;border-top:1px solid var(--b-rule);display:block;color:var(--b-ink)}
    .related .d{font-family:"Inter",sans-serif;font-size:11px;color:var(--b-muted);margin-bottom:4px}
    .related .t{font-size:17px;font-weight:600;line-height:1.3}

    /* TOC flottant */
    .toc{position:fixed;left:24px;top:140px;width:200px;font-family:"Inter",sans-serif;font-size:12px;color:var(--b-muted);line-height:1.5}
    .toc .lbl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--b-ink);margin-bottom:10px}
    .toc a{display:block;padding:4px 0;color:var(--b-muted);border-left:2px solid transparent;padding-left:10px;margin-left:-10px}
    .toc a.on{color:var(--b-ink);border-left-color:var(--b-accent)}
    @media(max-width:1300px){.toc{display:none}}

    /* Archives */
    .arch-year{padding:32px 0;border-bottom:1px solid var(--b-rule)}
    .arch-year h2{font-size:48px;font-weight:600;letter-spacing:-.5px;margin:0 0 24px}
    .arch-row{display:grid;grid-template-columns:120px 100px 1fr 160px;gap:32px;padding:14px 0;border-top:1px solid var(--b-rule);align-items:baseline;cursor:pointer}
    .arch-row:hover .t{color:var(--b-accent)}
    .arch-row .d{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--b-muted)}
    .arch-row .ty{font-family:"Inter",sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--b-accent)}
    .arch-row .t{font-size:18px;line-height:1.35;font-weight:500;transition:color .12s}
    .arch-row .p{font-family:"Inter",sans-serif;font-size:11px;color:var(--b-muted);text-align:right}

    /* Pôle */
    .pole-hero{padding:64px 0 48px;border-bottom:1px solid var(--b-rule)}
    .pole-hero .kicker{font-family:"Inter",sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--b-accent);margin-bottom:14px}
    .pole-hero h1{font-size:56px;line-height:1.05;font-weight:600;letter-spacing:-.6px;margin:0 0 18px}
    .pole-hero p{font-size:19px;line-height:1.55;color:var(--b-muted);max-width:720px;margin:0}
    .pole-hero .meta{font-family:"Inter",sans-serif;font-size:13px;color:var(--b-muted);margin-top:24px;display:flex;gap:24px}

    /* About */
    .about h1{font-size:56px;line-height:1.05;font-weight:600;letter-spacing:-.7px;margin:0 0 28px}
    .about h1 em{font-weight:500}
    .about .lede{font-size:22px;line-height:1.5;color:var(--b-muted);margin:0 0 24px;max-width:720px}
    .about p{font-size:18px;line-height:1.65;color:#22242e;margin:0 0 16px;max-width:720px}
    .about h2.sec{font-family:"Inter",sans-serif;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--b-ink);margin:0 0 24px}
    .about .row{display:grid;grid-template-columns:160px 240px 1fr;gap:32px;padding:20px 0;border-top:1px solid var(--b-rule);align-items:baseline}
    .about .row .d{font-family:"Inter",sans-serif;font-size:13px;color:var(--b-muted)}
    .about .row .p{font-size:20px;font-weight:600}
    .about .row .n{font-size:16px;line-height:1.5;color:#3b3f4d}

    /* Page transition */
    .page{animation:fadeIn .25s ease-out}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

    /* Print / no-JS hint */
    .nojs{display:none;padding:16px 80px;background:#fff7d6;font-family:Inter,sans-serif;font-size:13px}
    html.no-js .nojs{display:block}
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="carnet-b-app.jsx"></script>
</body>
</html>
